name: Build Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set weekly cache key
        run: echo "WEEK=$(date +%Y-W%V)" >> $GITHUB_ENV

      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: openwrt-sdk
          key: sdk-mediatek-filogic-${{ env.WEEK }}

      - name: Download and extract SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          SDK_URL=$(wget -qO- https://downloads.openwrt.org/snapshots/targets/mediatek/filogic/ \
            | grep -o 'openwrt-sdk[^"]*\.tar\.zst' | head -1)
          wget -q "https://downloads.openwrt.org/snapshots/targets/mediatek/filogic/${SDK_URL}"
          tar -xf openwrt-sdk-*.tar.zst
          mv openwrt-sdk-*/ openwrt-sdk/

      - name: Set SDK_DIR
        run: echo "SDK_DIR=openwrt-sdk" >> $GITHUB_ENV

      - name: Cache packages feed
        id: cache-feeds
        uses: actions/cache@v4
        with:
          path: openwrt-sdk/feeds/packages
          key: feeds-packages-${{ env.WEEK }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-openwrt-aarch64-${{ github.sha }}
          restore-keys: ccache-openwrt-aarch64-

      - name: Setup signing key
        run: |
          echo "${{ secrets.APK_SIGNING_KEY }}" > "$SDK_DIR/key-build.pem"
          openssl ec -pubout -in "$SDK_DIR/key-build.pem" -out "$SDK_DIR/key-build.pem.pub" 2>/dev/null || true

      - name: Inject openssl package into SDK
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/openwrt/openwrt.git openwrt-src
          cd openwrt-src && git sparse-checkout set package/libs/openssl && cd ..
          mkdir -p "$SDK_DIR/package/libs"
          cp -r openwrt-src/package/libs/openssl "$SDK_DIR/package/libs/"
          rm -rf openwrt-src

      - name: Configure feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          echo "src-link luci_sso $GITHUB_WORKSPACE" >> feeds.conf.default
          ./scripts/feeds update luci_sso
          ./scripts/feeds install -a -p luci_sso

      - name: Build packages
        working-directory: ${{ env.SDK_DIR }}
        run: |
          printf 'CONFIG_SIGNED_PACKAGES=y\nCONFIG_CCACHE=y\nCONFIG_PACKAGE_libopenssl3=m\nCONFIG_PACKAGE_luci-sso=m\nCONFIG_PACKAGE_luci-sso-crypto-openssl=m\n' >> .config
          make defconfig
          make package/libs/openssl/compile -j$(nproc) V=s
          make package/luci-sso/compile -j$(nproc) V=s
          make package/index

      - name: Collect artifacts
        run: |
          mkdir -p public/packages/aarch64_cortex-a53/luci_sso
          cp -r "$SDK_DIR/bin/packages/aarch64_cortex-a53/luci_sso/." public/packages/aarch64_cortex-a53/luci_sso/
          mkdir -p public/keys
          cp keys/luci-sso-feed.pub public/keys/

      - name: Publish
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
