name: Build Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set weekly cache key
        run: echo "WEEK=$(date +%Y-W%V)" >> $GITHUB_ENV

      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /tmp/openwrt-sdk-filogic
          key: sdk-snapshot-mediatek-filogic-${{ env.WEEK }}

      - name: Download SNAPSHOT SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          SDK_FILE=$(curl -s https://downloads.openwrt.org/snapshots/targets/mediatek/filogic/ \
            | grep -o 'openwrt-sdk[^"]*\.tar\.zst' | head -1)
          wget -q "https://downloads.openwrt.org/snapshots/targets/mediatek/filogic/${SDK_FILE}" -O /tmp/sdk.tar.zst
          mkdir -p /tmp/openwrt-sdk-filogic
          tar -xf /tmp/sdk.tar.zst -C /tmp/openwrt-sdk-filogic --strip-components=1
          rm /tmp/sdk.tar.zst

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-openwrt-aarch64-${{ github.sha }}
          restore-keys: ccache-openwrt-aarch64-

      - name: Setup signing key
        run: |
          echo "${{ secrets.APK_SIGNING_KEY }}" > /tmp/openwrt-sdk-filogic/private-key.pem
          openssl ec -in /tmp/openwrt-sdk-filogic/private-key.pem -pubout \
            > /tmp/openwrt-sdk-filogic/public-key.pem

      - name: Configure feeds
        working-directory: /tmp/openwrt-sdk-filogic
        run: |
          grep -q "luci_sso" feeds.conf.default || echo "src-link luci_sso $GITHUB_WORKSPACE" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a -p luci_sso
          ./scripts/feeds install libmbedtls libwolfssl libopenssl libucode ucode \
            ucode-mod-fs ucode-mod-ubus ucode-mod-uci ucode-mod-math \
            ucode-mod-uclient ucode-mod-uloop ucode-mod-log liblucihttp-ucode

      - name: Build packages
        working-directory: /tmp/openwrt-sdk-filogic
        run: |
          printf 'CONFIG_SIGNED_PACKAGES=y\nCONFIG_CCACHE=y\nCONFIG_PACKAGE_luci-sso=m\nCONFIG_PACKAGE_luci-sso-crypto-mbedtls=m\nCONFIG_PACKAGE_luci-sso-crypto-wolfssl=m\nCONFIG_PACKAGE_luci-sso-crypto-openssl=m\n' >> .config
          make defconfig
          make package/luci-sso/compile -j$(nproc) V=s
          make package/index

      - name: Collect artifacts
        run: |
          mkdir -p public/packages/aarch64_cortex-a53/luci_sso
          cp -r /tmp/openwrt-sdk-filogic/bin/packages/aarch64_cortex-a53/luci_sso/. \
            public/packages/aarch64_cortex-a53/luci_sso/
          mkdir -p public/keys
          cp keys/luci-sso-feed.pub public/keys/

      - name: Publish
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
