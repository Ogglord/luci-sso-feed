name: Build Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache SDK tarball
        uses: actions/cache@v4
        with:
          key: openwrt-sdk-mediatek-filogic-snapshot
          path: openwrt-sdk-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst

      - name: Download SDK
        run: |
          if [ ! -f openwrt-sdk-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst ]; then
            wget -q https://downloads.openwrt.org/snapshots/targets/mediatek/filogic/openwrt-sdk-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          fi
          tar -xf openwrt-sdk-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          SDK_DIR=$(ls -d openwrt-sdk-*/ | head -1)
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV

      - name: Setup signing key
        run: |
          echo "${{ secrets.APK_SIGNING_KEY }}" > "$SDK_DIR/key-build.pem"
          openssl ec -pubout -in "$SDK_DIR/key-build.pem" -out "$SDK_DIR/key-build.pem.pub" 2>/dev/null || true

      - name: Configure feed
        working-directory: ${{ env.SDK_DIR }}
        run: |
          echo "src-link luci_sso $GITHUB_WORKSPACE/luci-sso" >> feeds.conf.default
          ./scripts/feeds update luci_sso
          ./scripts/feeds install -a -p luci_sso

      - name: Build packages
        working-directory: ${{ env.SDK_DIR }}
        run: |
          printf 'CONFIG_SIGNED_PACKAGES=y\nCONFIG_PACKAGE_luci-sso=m\nCONFIG_PACKAGE_luci-sso-crypto-openssl=m\n' >> .config
          make defconfig
          make package/luci-sso/compile -j$(nproc) V=s 2>&1 | tail -100
          make package/index

      - name: Collect artifacts
        run: |
          mkdir -p public/packages/aarch64_cortex-a53/luci_sso
          cp -r "$SDK_DIR/bin/packages/aarch64_cortex-a53/luci_sso/." public/packages/aarch64_cortex-a53/luci_sso/
          mkdir -p public/keys
          cp keys/luci-sso-feed.pub public/keys/

      - name: Publish
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
