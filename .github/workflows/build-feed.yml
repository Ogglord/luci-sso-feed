name: Build Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set weekly cache key
        run: echo "WEEK=$(date +%Y-W%V)" >> $GITHUB_ENV

      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: openwrt-sdk
          key: sdk-pesa-mediatek-filogic-${{ env.WEEK }}

      - name: Download SDK from imagebuilder release
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download \
            --repo Ogglord/openwrt-imagebuilder-mt6000 \
            --pattern "*sdk*.tar.*" \
            --output sdk.tar.zst \
            --clobber \
            "$(gh release list --repo Ogglord/openwrt-imagebuilder-mt6000 --limit 1 --json tagName --jq '.[0].tagName')"
          tar -xf sdk.tar.zst
          mv openwrt-sdk-*/ openwrt-sdk/
          rm sdk.tar.zst

      - name: Set SDK_DIR
        run: echo "SDK_DIR=openwrt-sdk" >> $GITHUB_ENV

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-openwrt-aarch64-${{ github.sha }}
          restore-keys: ccache-openwrt-aarch64-

      - name: Setup signing key
        run: |
          echo "${{ secrets.APK_SIGNING_KEY }}" > "$SDK_DIR/key-build.pem"
          openssl ec -pubout -in "$SDK_DIR/key-build.pem" -out "$SDK_DIR/key-build.pem.pub" 2>/dev/null || true

      - name: Configure feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          echo "src-link luci_sso $GITHUB_WORKSPACE" >> feeds.conf.default
          ./scripts/feeds update luci_sso
          ./scripts/feeds install -a -p luci_sso

      - name: Build packages
        working-directory: ${{ env.SDK_DIR }}
        run: |
          printf 'CONFIG_SIGNED_PACKAGES=y\nCONFIG_CCACHE=y\nCONFIG_PACKAGE_luci-sso=m\nCONFIG_PACKAGE_luci-sso-crypto-openssl=m\n' >> .config
          make defconfig
          make package/luci-sso/compile -j$(nproc) V=s
          make package/index

      - name: Collect artifacts
        run: |
          mkdir -p public/packages/aarch64_cortex-a53/luci_sso
          cp -r "$SDK_DIR/bin/packages/aarch64_cortex-a53/luci_sso/." public/packages/aarch64_cortex-a53/luci_sso/
          mkdir -p public/keys
          cp keys/luci-sso-feed.pub public/keys/

      - name: Publish
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
